 apiVersion: apps/v1
 kind: Deployment
 metadata:
   name: client
 spec:
   replicas: 1
   selector:
     matchLabels:
       app: client
   template:
     metadata:
       labels:
         app: client
     spec:
       containers:
         - name: client
           image: todo-client:latest
           imagePullPolicy: Never
           ports:
             - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"